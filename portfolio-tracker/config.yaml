name: "Portfolio Tracker"
description: "Self-hosted stock portfolio tracker with Yahoo Finance data"
version: "0.2.0-beta.05"
slug: "portfolio_tracker"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
homeassistant_api: true
ingress: true
ingress_port: 3069
panel_icon: "mdi:chart-line"
panel_title: "Portfolio"
ports:
  3069/tcp: 3069
ports_description:
  3069/tcp: "Portfolio Tracker Web UI"
map:
  - data:rw
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "homeassistant"
  mqtt_pass: ""
schema:
  mqtt_host: str?
  mqtt_port: int?
  mqtt_user: str?
  mqtt_pass: str?
