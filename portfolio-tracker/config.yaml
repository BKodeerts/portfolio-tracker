name: "Portfolio Tracker"
description: "Self-hosted stock portfolio tracker with Yahoo Finance data"
version: "0.4.11"
slug: "portfolio_tracker"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
homeassistant_api: true
services:
  - mqtt:want
ingress: true
ingress_port: 3069
panel_icon: "mdi:chart-line"
panel_title: "Portfolio"
ports:
  3069/tcp: 3069
ports_description:
  3069/tcp: "Portfolio Tracker Web UI"
map:
  - data:rw
options:
  enable_ha_sensors: false
  push_interval: 15
  use_mqtt_discovery: false
  intraday_during_market_hours: false
  drawdown_alert_pct: 10
  target_value: 0
  push_positions: false
  watchlist: []
schema:
  enable_ha_sensors: bool
  push_interval: int(1,60)
  use_mqtt_discovery: bool
  intraday_during_market_hours: bool
  drawdown_alert_pct: int(1,50)
  target_value: float
  push_positions: bool
  watchlist:
    - str
  mqtt_broker: str?
  mqtt_port: int?
  mqtt_username: str?
  mqtt_password: password?
