<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portefeuille Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0a1a 0%, #111128 50%, #0d0d20 100%);
      color: #e2e8f0;
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    }
    #root { padding: 24px 20px 60px; max-width: 980px; margin: 0 auto; }

    /* ── App header ── */
    .app-header {
      display: flex; align-items: center;
      margin-bottom: 24px; gap: 12px;
    }
    .app-nav {
      display: flex; gap: 2px;
      background: rgba(255,255,255,0.04); border-radius: 10px; padding: 3px;
    }
    .nav-btn {
      padding: 6px 16px; border-radius: 7px; border: none;
      background: transparent; color: #64748b; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
    }
    .nav-btn:hover { color: #94a3b8; }
    .nav-btn.active { background: rgba(99,102,241,0.2); color: #a5b4fc; }

    /* ── Metric cards ── */
    .metrics-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px;
    }
    .metric-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 14px 16px;
    }
    .metric-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em;
      color: #475569; margin-bottom: 6px; font-weight: 600;
    }
    .metric-value {
      font-size: 19px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em;
    }
    .metric-sub {
      font-size: 10px; color: #475569; margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }
    .c-neutral { color: #94a3b8; }
    .c-brand   { color: #818cf8; }
    .c-pos     { color: #4ade80; }
    .c-neg     { color: #f87171; }

    /* ── Chart card ── */
    .chart-card {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px; padding: 16px 16px 14px;
    }
    .chart-card canvas { width: 100% !important; }

    /* Chart card header — view controls left, period pills right */
    .chart-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }

    /* Segmented control */
    .seg {
      display: flex; background: rgba(255,255,255,0.06);
      border-radius: 8px; padding: 2px; gap: 1px;
    }
    .seg-btn {
      padding: 5px 13px; border-radius: 6px; border: none;
      background: transparent; color: #64748b; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
    }
    .seg-btn:hover { color: #94a3b8; }
    .seg-btn.on { background: rgba(99,102,241,0.28); color: #a5b4fc; }

    /* Period pills */
    .period-pills { display: flex; gap: 1px; margin-left: auto; }
    .pill {
      padding: 5px 10px; border-radius: 6px; border: none;
      background: transparent; color: #475569; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .pill:hover { color: #64748b; }
    .pill.on { background: rgba(255,255,255,0.08); color: #94a3b8; }

    /* Closed toggle */
    .closed-toggle {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #475569; cursor: pointer; user-select: none;
    }
    .toggle-track {
      width: 26px; height: 15px; border-radius: 8px;
      background: rgba(255,255,255,0.1); position: relative; transition: background 0.2s;
    }
    .toggle-track.on { background: rgba(99,102,241,0.5); }
    .toggle-track::after {
      content: ''; position: absolute;
      width: 11px; height: 11px; border-radius: 50%;
      background: #94a3b8; top: 2px; left: 2px; transition: left 0.15s, background 0.2s;
    }
    .toggle-track.on::after { left: 13px; background: #a5b4fc; }

    /* Refresh icon button */
    .refresh-btn {
      width: 28px; height: 28px; border-radius: 7px; border: none;
      background: rgba(255,255,255,0.05); color: #475569; font-size: 13px;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); color: #94a3b8; }

    /* Chart section title */
    .card-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em;
      color: #475569; font-weight: 600; margin-bottom: 14px;
    }

    /* Legend */
    .legend {
      display: flex; justify-content: center; flex-wrap: wrap;
      gap: 5px 14px; margin-top: 14px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8; }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .legend-line { width: 16px; height: 2px; border-radius: 2px; flex-shrink: 0; }

    /* Home bottom grid */
    .home-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;
    }
    .home-grid .chart-card { max-width: none; margin: 0; }

    /* Compact positions list */
    .pos-list { width: 100%; }
    .pos-row {
      display: grid; grid-template-columns: 1fr auto auto;
      align-items: center; gap: 8px;
      padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12px;
    }
    .pos-row:last-child { border-bottom: none; }
    .pos-row-ticker { display: flex; align-items: center; gap: 7px; font-weight: 600; }
    .pos-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pos-row-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #94a3b8; text-align: right; }
    .pos-row-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: right; min-width: 52px; }
    .pos-row.total-row {
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: none; padding-top: 10px; margin-top: 2px;
      font-weight: 700;
    }
    .pos-row.total-row .pos-row-ticker { color: #94a3b8; }

    /* Full positions table (analyse tab) */
    #positionsTableWrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .pos-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 560px; }
    .pos-table th {
      color: #475569; text-align: right; padding: 8px 12px; font-weight: 600;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .pos-table th:first-child, .pos-table th:nth-child(2) { text-align: left; }
    .pos-table td {
      padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03);
      text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    }
    .pos-table td:first-child { text-align: left; font-family: inherit; font-size: 12px; font-weight: 600; }
    .pos-table td:nth-child(2) { text-align: left; font-family: inherit; font-size: 11px; color: #94a3b8; }
    .pos-table tfoot td { font-weight: 700; border-bottom: none; border-top: 1px solid rgba(255,255,255,0.08); }

    /* Analyse grid */
    .analyse-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .analyse-full { grid-column: 1 / -1; }

    /* Import */
    .import-wrap { max-width: 680px; margin: 0 auto; }
    .drop-zone {
      border: 2px dashed rgba(255,255,255,0.1); border-radius: 16px; padding: 48px 24px;
      text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.04); }
    .drop-zone p { color: #64748b; font-size: 13px; margin-top: 8px; }
    .drop-zone strong { color: #94a3b8; font-size: 15px; }
    .drop-zone label { color: #818cf8; cursor: pointer; text-decoration: underline; }
    .map-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 12px; }
    .map-table th { color: #475569; text-align: left; padding: 7px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .map-table td { padding: 5px 5px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .map-table input, .map-table select {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: #e2e8f0; padding: 5px 8px; font-size: 11px;
      font-family: 'JetBrains Mono', monospace; width: 100%; outline: none;
    }
    .map-table input:focus, .map-table select:focus { border-color: rgba(99,102,241,0.5); }
    .map-table input.invalid { border-color: rgba(239,68,68,0.5); }
    .map-table select option { background: #111128; }
    .import-info {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 18px;
      font-size: 13px; color: #94a3b8; line-height: 1.6;
    }
    .import-info strong { color: #e2e8f0; }
    .import-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; flex-wrap: wrap; }
    .btn {
      padding: 7px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03); color: #64748b; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .btn:hover { border-color: rgba(255,255,255,0.15); color: #94a3b8; }
    .btn.success { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.07); color: #4ade80; }

    /* Loading / Error */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 380px; gap: 20px; }
    .progress-bar { width: 240px; background: rgba(255,255,255,0.06); border-radius: 8px; overflow: hidden; height: 5px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #06b6d4); border-radius: 8px; }
    .error-box {
      max-width: 480px; margin: 60px auto; background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 24px; text-align: center;
    }
    .footer { text-align: center; margin-top: 32px; font-size: 10px; color: #2d3748; line-height: 1.6; }

    /* Intraday sparklines */
    .intraday-section { margin-bottom: 12px; }
    .intraday-section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .intraday-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 640px) { .intraday-grid { grid-template-columns: repeat(2, 1fr); } }
    .intraday-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 14px 16px; overflow: hidden; min-width: 0;
    }
    .market-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px; padding: 3px 7px; white-space: nowrap;
    }
    .market-badge .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* Privacy mode */
    .privacy-btn {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #64748b; cursor: pointer; font-size: 15px;
      padding: 5px 9px; line-height: 1; transition: color 0.15s, background 0.15s;
    }
    .privacy-btn:hover { background: rgba(255,255,255,0.08); color: #94a3b8; }
    .privacy-btn.on { color: #a5b4fc; border-color: rgba(99,102,241,0.3); }
    body.privacy .privacy-val,
    body.privacy .pos-row-val,
    body.privacy .pos-table td:nth-child(n+4):not(:last-child),
    body.privacy .pos-table tfoot td:nth-child(n+2):not(:last-child) {
      filter: blur(7px); user-select: none;
    }

    /* ── Theme: dark (warm neutral dark) ── */
    body.theme-dark {
      background: linear-gradient(145deg, #111111 0%, #1a1a1a 50%, #131313 100%);
      color: #d4d4d4;
    }
    body.theme-dark .app-nav { background: rgba(255,255,255,0.05); }
    /* inactive → #777, hover → #bbb, active → #d4d4d4 */
    body.theme-dark .nav-btn                  { color: #777; }
    body.theme-dark .nav-btn:hover            { color: #bbb; }
    body.theme-dark .nav-btn.active           { background: rgba(255,255,255,0.1); color: #d4d4d4; }
    body.theme-dark .metric-card,
    body.theme-dark .intraday-card            { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
    body.theme-dark .metric-label             { color: #888; }
    body.theme-dark .metric-sub               { color: #888; }
    body.theme-dark .c-neutral                { color: #999; }
    body.theme-dark .c-brand                  { color: #bbb; }
    body.theme-dark .chart-card               { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.07); }
    body.theme-dark .seg                      { background: rgba(255,255,255,0.07); }
    body.theme-dark .seg-btn                  { color: #777; }
    body.theme-dark .seg-btn:hover            { color: #bbb; }
    body.theme-dark .seg-btn.on               { background: rgba(255,255,255,0.12); color: #d4d4d4; }
    body.theme-dark .period-pills             { gap: 2px; }
    body.theme-dark .pill                     { color: #777; }
    body.theme-dark .pill:hover               { color: #bbb; }
    body.theme-dark .pill.on                  { background: rgba(255,255,255,0.1); color: #d4d4d4; }
    body.theme-dark .card-title               { color: #888; }
    body.theme-dark .legend-item              { color: #888; }
    body.theme-dark .pos-row                  { border-bottom-color: rgba(255,255,255,0.04); }
    body.theme-dark .pos-row.total-row        { border-top-color: rgba(255,255,255,0.08); }
    body.theme-dark .pos-row.total-row .pos-row-ticker { color: #999; }
    body.theme-dark .pos-row-val              { color: #888; }
    body.theme-dark .market-badge             { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.07); color: #999; }
    body.theme-dark .refresh-btn              { background: rgba(255,255,255,0.04); color: #888; }
    body.theme-dark .refresh-btn:hover        { background: rgba(255,255,255,0.09); color: #bbb; }
    body.theme-dark .privacy-btn              { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #888; }
    body.theme-dark .privacy-btn:hover        { background: rgba(255,255,255,0.09); color: #bbb; }
    body.theme-dark .privacy-btn.on           { color: #d4d4d4; border-color: rgba(255,255,255,0.2); }
    body.theme-dark .toggle-track             { background: rgba(255,255,255,0.08); }
    body.theme-dark .toggle-track.on          { background: rgba(255,255,255,0.2); }
    body.theme-dark .toggle-track::after      { background: #888; }
    body.theme-dark .toggle-track.on::after   { background: #bbb; }
    body.theme-dark .closed-toggle            { color: #777; }
    body.theme-dark .pos-table th             { color: #888; border-bottom-color: rgba(255,255,255,0.06); }
    body.theme-dark .pos-table td             { border-bottom-color: rgba(255,255,255,0.03); }
    body.theme-dark .pos-table td:nth-child(2){ color: #888; }
    body.theme-dark .pos-table tfoot td       { border-top-color: rgba(255,255,255,0.08); }
    body.theme-dark .drop-zone                { border-color: rgba(255,255,255,0.08); }
    body.theme-dark .import-info              { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.06); color: #888; }
    body.theme-dark .import-info strong       { color: #d4d4d4; }
    body.theme-dark .btn                      { border-color: rgba(255,255,255,0.07); color: #777; }
    body.theme-dark .btn:hover                { border-color: rgba(255,255,255,0.15); color: #bbb; }
    body.theme-dark .footer                   { color: #4a4a4a; }
    body.theme-dark .progress-bar             { background: rgba(255,255,255,0.07); }

    /* Responsive */
    @media (max-width: 640px) {
      .metrics-grid { grid-template-columns: 1fr 1fr; }
      .home-grid { grid-template-columns: 1fr; }
      .analyse-grid { grid-template-columns: 1fr; }
      .analyse-full { grid-column: 1; }
      .chart-header { gap: 8px; }
      .metric-value { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

  <script>
// ============================================================
// CONSTANTS
// ============================================================
// Set to e.g. "http://192.168.20.232:3069" to point at a remote server, or "" for same-origin
const SERVER_BASE    = ".";

const FX_SYMBOL      = "EURUSD=X";
const FX_FALLBACK    = 1.09;
const BENCHMARK_SYM  = "VWCE.DE";
const BENCHMARK_LBL  = "VWCE All-World";

const COLOR_PALETTE = [
  "#6366f1","#06b6d4","#f59e0b","#ef4444","#10b981","#eab308",
  "#8b5cf6","#fb923c","#84cc16","#f472b6","#22d3ee","#dc2626",
  "#64748b","#94a3b8","#a78bfa","#16a34a","#d946ef","#0284c7",
];
const PRESET_COLORS = {
  ASTS:"#6366f1", RKLB:"#06b6d4", LUNR:"#f59e0b", SMR:"#ef4444",
  SXRT:"#10b981", PPFB:"#eab308", EUDF:"#8b5cf6",
  VWCE:"#64748b", IUIT:"#94a3b8", EXSA:"#78716c", EQQQ:"#a78bfa",
  ACHR:"#fb923c", LODE:"#84cc16", ATYR:"#f472b6", HODL:"#22d3ee", ZIM:"#dc2626",
};

// ============================================================
// STATE
// ============================================================
let RAW_TRANSACTIONS = [];
let TICKER_META      = {};
let CURRENT_TICKERS  = [];
let COLORS           = {};
let privacyMode      = localStorage.getItem("privacy") === "1";
let currentTheme     = localStorage.getItem("theme") || "default";

function applyTheme() {
  document.body.classList.toggle("theme-dark", currentTheme === "dark");
}

let fxRateMap     = {};
let priceMaps     = {};
let sortedDates   = [];
let chartData     = [];
let benchmarkData = [];

let intradayData   = {};
let intradayLoaded = false;
let parsedCSVRows  = [];
let currentTab     = "portefeuille";
let currentView    = "total";
let currentPeriod  = "3m";
let showClosed     = false;
let chartInstances = {};

// ============================================================
// UTILS
// ============================================================
const fmt    = v => `€${Math.round(v).toLocaleString("nl-BE")}`;
const fmtPct = v => `${parseFloat(v) >= 0 ? "+" : ""}${parseFloat(v).toFixed(1)}%`;

const toEur = (v, currency, date) => {
  if (currency !== "USD") return v;
  return v / (fxRateMap[date] || FX_FALLBACK);
};

function getColor(ticker) {
  if (!COLORS[ticker]) {
    COLORS[ticker] = PRESET_COLORS[ticker] || COLOR_PALETTE[Object.keys(COLORS).length % COLOR_PALETTE.length];
  }
  return COLORS[ticker];
}

function getFilteredData() {
  if (currentPeriod === "total") return chartData;
  const now = new Date();
  let cutoff;
  if      (currentPeriod === "ytd") cutoff = `${now.getFullYear()}-01-01`;
  else if (currentPeriod === "1m")  { const d = new Date(now); d.setMonth(d.getMonth()-1);      cutoff = d.toISOString().slice(0,10); }
  else if (currentPeriod === "3m")  { const d = new Date(now); d.setMonth(d.getMonth()-3);      cutoff = d.toISOString().slice(0,10); }
  else if (currentPeriod === "6m")  { const d = new Date(now); d.setMonth(d.getMonth()-6);      cutoff = d.toISOString().slice(0,10); }
  else if (currentPeriod === "1y")  { const d = new Date(now); d.setFullYear(d.getFullYear()-1); cutoff = d.toISOString().slice(0,10); }
  else if (currentPeriod === "2y")  { const d = new Date(now); d.setFullYear(d.getFullYear()-2); cutoff = d.toISOString().slice(0,10); }
  else if (currentPeriod === "3y")  { const d = new Date(now); d.setFullYear(d.getFullYear()-3); cutoff = d.toISOString().slice(0,10); }
  return chartData.filter(d => d.date >= cutoff);
}

function buildTickerMeta() {
  TICKER_META = {};
  RAW_TRANSACTIONS.forEach(t => {
    if (!TICKER_META[t.ticker]) TICKER_META[t.ticker] = { yahoo: t.yahoo, currency: t.currency, label: t.label };
  });
}

function computeCurrentTickers() {
  const net = {};
  RAW_TRANSACTIONS.forEach(t => { net[t.ticker] = (net[t.ticker] || 0) + t.shares; });
  return Object.keys(net).filter(t => net[t] > 0);
}

function destroyAllCharts() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch {} });
  chartInstances = {};
}

// ============================================================
// CSV PARSING
// ============================================================
function parseCSVLine(line) {
  const result = [];
  let cell = "", inQuote = false;
  for (const ch of line) {
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === "," && !inQuote) { result.push(cell.trim()); cell = ""; }
    else { cell += ch; }
  }
  result.push(cell.trim());
  return result;
}

function parseEuropeanNumber(s) {
  if (!s) return NaN;
  return parseFloat(s.replace(/\./g, "").replace(",", ".").replace(/[^\d.-]/g, ""));
}

function parseDeGiroCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) throw new Error("CSV te kort of leeg");

  const headers  = parseCSVLine(lines[0]).map(h => h.toLowerCase());
  const iDatum   = headers.indexOf("datum");
  const iProduct = headers.indexOf("product");
  const iISIN    = headers.indexOf("isin");
  const iBeurs   = headers.indexOf("beurs");
  const iAantal  = headers.indexOf("aantal");
  const iWissel  = headers.lastIndexOf("wisselkoers");
  const iTotaal  = headers.findIndex((h, i) => h.includes("totaal") && i > 10);
  const iOrderId = headers.findIndex(h => h.includes("order"));
  // DeGiro new format: col after Order ID contains a transaction UUID (fallback identifier)
  const iOrderId2 = iOrderId >= 0 ? iOrderId + 1 : -1;

  if (iDatum < 0 || iAantal < 0) throw new Error("Onverwacht CSV-formaat: kolomkoppen niet herkend");

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = parseCSVLine(lines[i]);
    const datum   = (cols[iDatum]   || "").trim();
    const product = (cols[iProduct] || "").trim();
    const isin    = (cols[iISIN]    || "").trim();
    const beurs   = (cols[iBeurs]   || "").trim();
    const aantal  = parseEuropeanNumber(cols[iAantal]);
    const wissel  = iWissel >= 0 ? parseEuropeanNumber(cols[iWissel]) : NaN;
    const totaal  = iTotaal >= 0 ? parseEuropeanNumber(cols[iTotaal]) : NaN;
    const orderId1 = iOrderId  >= 0 ? (cols[iOrderId]  || "").trim() : "";
    const orderId2 = iOrderId2 >= 0 ? (cols[iOrderId2] || "").trim() : "";
    const orderId  = orderId1 || orderId2;
    // Corporate actions (splits, ticker renames) have no identifier in either column — skip them
    if (!orderId) continue;
    if (!isin || !datum || isNaN(aantal) || aantal === 0) continue;
    const parts = datum.split("-");
    if (parts.length !== 3) continue;
    const date = `${parts[2]}-${parts[1]}-${parts[0]}`;
    const currency = (!isNaN(wissel) && Math.abs(wissel - 1) > 0.01) ? "USD" : "EUR";
    rows.push({ date, datum, product, isin, beurs, shares: aantal, wisselkoers: wissel, totaalEur: totaal, orderId, currency });
  }
  return rows;
}

function aggregateOrders(rows) {
  const map = {};
  rows.forEach(r => {
    const key = r.orderId ? `${r.orderId}|${r.isin}` : `${r.date}|${r.isin}|${r.shares}`;
    if (!map[key]) { map[key] = { ...r }; }
    else { map[key].shares += r.shares; map[key].totaalEur += r.totaalEur; }
  });
  return Object.values(map).sort((a, b) => a.date.localeCompare(b.date));
}

const EXCHANGE_SUFFIXES = {
  XETRA:".DE", XET:".DE", GER:".DE", XAMS:".AS", AMS:".AS",
  XPAR:".PA", EPA:".PA", XLON:".L", LSE:".L", XMIL:".MI", MIL:".MI",
  XBRU:".BR", BRU:".BR", XSWX:".SW", SWX:".SW",
  NSQ:"", NYSE:"", XNAS:"", XNYS:"",
};
function guessYahooSuffix(beurs) { return EXCHANGE_SUFFIXES[beurs.toUpperCase()] ?? ""; }

function buildIsinLookup() {
  const map = {};
  RAW_TRANSACTIONS.forEach(t => { if (t.isin && !map[t.isin]) map[t.isin] = { ticker: t.ticker, yahoo: t.yahoo }; });
  return map;
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadData() {
  document.getElementById("root").innerHTML = `
    ${renderAppHeader()}
    <div class="loading">
      <div style="color:#94a3b8;font-size:13px;margin-bottom:12px">Koersen laden…</div>
      <div class="progress-bar"><div class="progress-fill" style="width:15%"></div></div>
    </div>`;

  try {
    const uniqueYahoo = {};
    RAW_TRANSACTIONS.forEach(t => {
      if (!uniqueYahoo[t.yahoo]) {
        const first = RAW_TRANSACTIONS.find(r => r.yahoo === t.yahoo);
        uniqueYahoo[t.yahoo] = { ticker: t.ticker, startDate: first.date };
      }
    });

    const symbols  = Object.keys(uniqueYahoo);
    const froms    = symbols.map(s => uniqueYahoo[s].startDate);
    const earliest = froms.reduce((a, b) => a < b ? a : b, froms[0]);

    const allSymbols = [...symbols];
    const allFroms   = [...froms];
    if (!allSymbols.includes(FX_SYMBOL))     { allSymbols.push(FX_SYMBOL);     allFroms.push(earliest); }
    if (!allSymbols.includes(BENCHMARK_SYM)) { allSymbols.push(BENCHMARK_SYM); allFroms.push(earliest); }

    const res  = await fetch(`${SERVER_BASE}/api/batch?symbols=${allSymbols.join(",")}&froms=${allFroms.join(",")}`);
    const json = await res.json();
    if (json.status !== "ok") throw new Error(json.message || "Server error");

    const priceData = json.data;

    fxRateMap = {};
    if (priceData[FX_SYMBOL]) {
      priceData[FX_SYMBOL].forEach(d => { fxRateMap[d.date] = d.close; });
      delete priceData[FX_SYMBOL];
    }

    if (Object.values(priceData).filter(Boolean).length === 0) throw new Error("Geen koersdata ontvangen");

    const allDates = new Set();
    Object.values(priceData).forEach(h => { if (h) h.forEach(d => allDates.add(d.date)); });
    sortedDates = [...allDates].sort();

    priceMaps = {};
    Object.entries(priceData).forEach(([yahoo, history]) => {
      const m = {};
      if (history) history.forEach(d => { m[d.date] = d.close; });
      let last = null;
      sortedDates.forEach(date => {
        if (m[date] != null) last = m[date];
        else if (last != null) m[date] = last;
      });
      priceMaps[yahoo] = m;
    });

    let lastFx = FX_FALLBACK;
    sortedDates.forEach(date => {
      if (fxRateMap[date] != null) lastFx = fxRateMap[date];
      else fxRateMap[date] = lastFx;
    });

    const txByTicker = {};
    RAW_TRANSACTIONS.forEach(t => { (txByTicker[t.ticker] = txByTicker[t.ticker] || []).push(t); });

    // Detect reverse-split factor per ticker: Yahoo Finance shows split-adjusted prices but
    // DeGiro CSV exports pre-split share counts. Compare implied tx price vs Yahoo price on buy date.
    const SPLIT_CANDIDATES = [2, 3, 4, 5, 8, 10, 20, 25, 50, 100];
    const splitFactors = {};
    Object.entries(txByTicker).forEach(([ticker, txs]) => {
      const meta = TICKER_META[ticker];
      for (const tx of txs.filter(t => t.shares > 0).sort((a,b) => a.date < b.date ? -1 : 1)) {
        const yahooPrice = priceMaps[meta.yahoo]?.[tx.date];
        if (!yahooPrice) continue;
        const fx = fxRateMap[tx.date] || FX_FALLBACK;
        const txPrice = meta.currency === "USD" ? (tx.costEur / tx.shares) * fx : tx.costEur / tx.shares;
        const ratio = yahooPrice / txPrice;
        splitFactors[ticker] = ratio > 2
          ? SPLIT_CANDIDATES.reduce((b, f) => Math.abs(f - ratio) < Math.abs(b - ratio) ? f : b, 1)
          : 1;
        break; // use first buy transaction as canonical reference
      }
      if (splitFactors[ticker] == null) splitFactors[ticker] = 1;
    });

    // Return split-adjusted share count for a single transaction
    function adjShares(tx, ticker) {
      const factor = splitFactors[ticker] || 1;
      if (factor === 1) return tx.shares;
      const meta = TICKER_META[ticker];
      const yahooPrice = priceMaps[meta.yahoo]?.[tx.date];
      if (!yahooPrice) return tx.shares;
      const fx = fxRateMap[tx.date] || FX_FALLBACK;
      const txPrice = meta.currency === "USD"
        ? (Math.abs(tx.costEur) / Math.abs(tx.shares)) * fx
        : Math.abs(tx.costEur) / Math.abs(tx.shares);
      return yahooPrice / txPrice > 2 ? tx.shares / factor : tx.shares;
    }

    // FIFO cost basis: walk buys/sells in date order, deplete lots correctly
    function fifoCostBasis(txs, ticker, upToDate) {
      const lots = []; // { shares, costPerShare }
      for (const tx of txs.filter(t => t.date <= upToDate).sort((a,b) => a.date < b.date ? -1 : 1)) {
        const sh = adjShares(tx, ticker);
        if (tx.shares > 0) {
          lots.push({ shares: sh, costPerShare: tx.costEur / sh });
        } else {
          let toSell = -sh;
          for (const lot of lots) {
            const sold = Math.min(lot.shares, toSell);
            lot.shares -= sold;
            toSell -= sold;
            if (toSell <= 0) break;
          }
        }
      }
      return lots.filter(l => l.shares > 0).reduce((s, l) => s + l.shares * l.costPerShare, 0);
    }

    chartData = sortedDates.map(date => {
      const row = { date };
      let totalValue = 0, totalCost = 0;

      Object.entries(txByTicker).forEach(([ticker, txs]) => {
        const meta = TICKER_META[ticker];
        let sharesHeld = 0;
        txs.forEach(t => { if (t.date <= date) sharesHeld += adjShares(t, ticker); });

        if (sharesHeld > 0 && priceMaps[meta.yahoo]?.[date] != null) {
          const value = toEur(sharesHeld * priceMaps[meta.yahoo][date], meta.currency, date);
          row[ticker] = Math.round(value);
          row[`${ticker}_shares`] = sharesHeld;
          totalValue += value;

          const cost = fifoCostBasis(txs, ticker, date);
          row[`${ticker}_cost`] = Math.round(cost);
          totalCost += cost;
          if (cost > 0) row[`${ticker}_pct`] = (((value - cost) / cost) * 100).toFixed(1);
        }
      });

      if (totalValue === 0) return null;
      row.total     = Math.round(totalValue);
      row.totalCost = Math.round(totalCost);
      row.profit    = Math.round(totalValue - totalCost);
      row.pctReturn = totalCost > 0 ? (((totalValue - totalCost) / totalCost) * 100).toFixed(1) : "0.0";
      return row;
    }).filter(Boolean);

    benchmarkData = [];
    if (priceMaps[BENCHMARK_SYM] && chartData.length > 0) {
      const basePrice = priceMaps[BENCHMARK_SYM][chartData[0].date];
      if (basePrice) {
        chartData.forEach(row => {
          const p = priceMaps[BENCHMARK_SYM][row.date];
          if (p != null) benchmarkData.push({ date: row.date, value: parseFloat(((p / basePrice) * 100).toFixed(2)) });
        });
      }
    }

    // Append today from daily quotes
    try {
      const quoteSymbols = [...new Set(Object.values(TICKER_META).map(m => m.yahoo)), FX_SYMBOL];
      const qRes  = await fetch(`${SERVER_BASE}/api/quotes?symbols=${quoteSymbols.join(",")}`);
      const qJson = await qRes.json();
      if (qJson.status === "ok" && qJson.data) {
        const quotes = qJson.data;
        if (quotes[FX_SYMBOL]?.close) fxRateMap[quotes[FX_SYMBOL].date] = quotes[FX_SYMBOL].close;
        const todayDate = quotes[Object.keys(quotes).find(k => quotes[k]?.date)]?.date;
        if (todayDate && todayDate > (chartData[chartData.length-1]?.date || "")) {
          const row = { date: todayDate };
          let tv = 0, tc = 0;
          Object.entries(txByTicker).forEach(([ticker, txs]) => {
            const meta = TICKER_META[ticker];
            let sh = 0; txs.forEach(t => { if (t.date <= todayDate) sh += adjShares(t, ticker); });
            const q = quotes[meta.yahoo];
            if (sh > 0 && q?.close) {
              const val = toEur(sh * q.close, meta.currency, todayDate);
              row[ticker] = Math.round(val);
              row[`${ticker}_shares`] = sh;
              tv += val;
              const cost = fifoCostBasis(txs, ticker, todayDate);
              row[`${ticker}_cost`] = Math.round(cost); tc += cost;
              if (cost > 0) row[`${ticker}_pct`] = (((val-cost)/cost)*100).toFixed(1);
            }
          });
          if (tv > 0) {
            row.total = Math.round(tv); row.totalCost = Math.round(tc);
            row.profit = Math.round(tv-tc);
            row.pctReturn = tc > 0 ? (((tv-tc)/tc)*100).toFixed(1) : "0.0";
            chartData.push(row);
          }
        }
      }
    } catch (e) { console.warn("Daily quotes failed:", e.message); }

    renderApp();
  } catch (e) {
    document.getElementById("root").innerHTML = `
      ${renderAppHeader()}
      <div class="error-box">
        <div style="font-size:14px;color:#f87171;margin-bottom:8px;font-weight:600">Laden mislukt</div>
        <div style="font-size:12px;color:#94a3b8;line-height:1.6">${e.message}</div>
        <button class="btn" onclick="init()" style="margin-top:16px">Opnieuw proberen</button>
      </div>`;
  }
}

function renderPortfolioChart(visibleTickers) {
  const ctx      = document.getElementById("mainChart").getContext("2d");
  const filtered = getFilteredData();
  const labels   = filtered.map(d => d.date);
  let datasets   = [];

  if (currentView === "total") {
    datasets = [
      { label:"Portefeuille", data: filtered.map(d => d.total),
        borderColor:"#818cf8", backgroundColor:"rgba(99,102,241,0.1)",
        fill:true, borderWidth:2, pointRadius:0, tension:0, cubicInterpolationMode:"monotone" },
      { label:"Kostprijs",    data: filtered.map(d => d.totalCost),
        borderColor:chartTheme().costLine, backgroundColor:chartTheme().costFill,
        fill:true, borderWidth:1, borderDash:[4,4], pointRadius:0, tension:0, cubicInterpolationMode:"monotone" },
    ];
  } else if (currentView === "individual") {
    datasets = [...visibleTickers].reverse().map(ticker => ({
      label: ticker, data: filtered.map(d => d[ticker] || 0),
      borderColor: getColor(ticker), backgroundColor: getColor(ticker) + "28",
      fill:true, borderWidth:1.5, pointRadius:0, tension:0, cubicInterpolationMode:"monotone", stack:"stack",
    }));
  } else if (currentView === "pct") {
    datasets = visibleTickers.map(ticker => ({
      label: ticker,
      data: filtered.map(d => d[`${ticker}_pct`] != null ? parseFloat(d[`${ticker}_pct`]) : null),
      borderColor: getColor(ticker), fill:false, borderWidth:2, pointRadius:0, tension:0, cubicInterpolationMode:"monotone", spanGaps:true,
    }));
  } else {
    // pl view: per-ticker profit/loss in EUR
    datasets = [...visibleTickers].reverse().map(ticker => ({

// US: 9:30–16:00 ET = 390 min; EU (XETRA/Euronext/LSE): 9:00–17:30 CET = 510 min
function getTradingMins(yahooSymbol) {
  return /\.(DE|AS|PA|L|MI|BR|SW|ST|HE|CO|OL)$/i.test(yahooSymbol || "") ? 510 : 390;
}

// Simple open/closed badges (no countdown)
function getMarketStatus() {
  const now = new Date();
  function isOpen(tz, openH, openM, closeH, closeM) {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: tz, weekday: "short", hour: "numeric", minute: "numeric", hour12: false
    }).formatToParts(now);
    const get = t => parts.find(p => p.type === t)?.value;
    if (["Sat", "Sun"].includes(get("weekday"))) return false;
    const cur = (parseInt(get("hour")) % 24) * 60 + parseInt(get("minute"));
    return cur >= openH * 60 + openM && cur < closeH * 60 + closeM;
  }
  const badge = (label, open) =>
    `<span class="market-badge"><span class="dot" style="background:${open ? "#4ade80" : "#334155"}"></span>${label}</span>`;
  return badge("NYSE", isOpen("America/New_York", 9, 30, 16, 0)) +
         badge("XETRA", isOpen("Europe/Amsterdam", 9, 0, 17, 30));
}

function renderMarketStatus() {
  const el = document.getElementById("marketStatus");
  if (el) el.innerHTML = getMarketStatus();
}

// X axis maps to full trading session (open=left, close=right)
// Elapsed data fills left portion; remaining time is empty space on the right
function sparklineSVG(points, prevClose, tradingMins) {
  if (!points || points.length < 2 || !prevClose) return '';
  const pcts = points.map(p => (p.close - prevClose) / prevClose * 100);
  const min = Math.min(0, ...pcts);
  const max = Math.max(0, ...pcts);
  const range = max - min || 0.1;
  const W = 200, H = 38;
  const firstTs   = points[0].ts;
  const totalSecs = (tradingMins || 390) * 60;
  const xs = points.map(p => Math.min(W, Math.max(0, ((p.ts - firstTs) / totalSecs) * W)));
  const ys = pcts.map(v => (H - 3) - ((v - min) / range) * (H - 6));
  const polyPts = xs.map((x, i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const fillPath = `M${xs[0].toFixed(1)},${ys[0].toFixed(1)} ` +
    xs.slice(1).map((x, i) => `L${x.toFixed(1)},${ys[i + 1].toFixed(1)}`).join(' ') +
    ` L${xs[xs.length - 1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  const zeroY = ((H - 3) - ((-min) / range) * (H - 6)).toFixed(1);
  const clr = pcts[pcts.length - 1] >= 0 ? '#4ade80' : '#f87171';
  const uid = `sp${Math.random().toString(36).slice(2, 7)}`;
  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;margin-top:8px">
    <defs><linearGradient id="${uid}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${clr}" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="${clr}" stop-opacity="0.02"/>
    </linearGradient></defs>
    <line x1="0" y1="${zeroY}" x2="${W}" y2="${zeroY}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <path d="${fillPath}" fill="url(#${uid})"/>
    <polyline points="${polyPts}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function computeTodayPL() {
  let plEur = 0, baseEur = 0;
  const latest = chartData[chartData.length - 1];
  CURRENT_TICKERS.forEach(ticker => {
    const meta = TICKER_META[ticker];
    const data = intradayData[meta?.yahoo];
    if (!data?.previousClose || !data.points?.length) return;
    const shares = latest?.[`${ticker}_shares`];
    if (!shares) return;
    const lastPrice = data.points[data.points.length - 1].close;
    const fx = fxRateMap[data.date] || FX_FALLBACK;
    const toEurFactor = meta.currency === "USD" ? 1 / fx : 1;
    plEur   += shares * (lastPrice - data.previousClose) * toEurFactor;
    baseEur += shares * data.previousClose * toEurFactor;
  });
  return baseEur > 0 ? { pl: plEur, pct: (plEur / baseEur) * 100 } : null;
}

function renderTodayMetric() {
  const el = document.getElementById("metricToday");
  if (!el) return;
  const r = computeTodayPL();
  if (!r) {
    el.innerHTML = `<div class="metric-value c-neutral" style="font-size:17px">—</div><div class="metric-sub">geen data</div>`;
    return;
  }
  const cls  = r.pl >= 0 ? "c-pos" : "c-neg";
  const sign = r.pl >= 0 ? "+" : "";
  el.innerHTML = `<div class="metric-value ${cls} privacy-val" style="font-size:17px">${sign}${fmt(r.pl)}</div><div class="metric-sub ${cls}">${sign}${r.pct.toFixed(2)}%</div>`;
}

function renderIntradaySection() {
  const gridEl   = document.getElementById("intradayGrid");
  const statusEl = document.getElementById("intradayStatus");
  if (!gridEl) return;

  const entries = CURRENT_TICKERS
    .map(t => ({ ticker: t, yahoo: TICKER_META[t]?.yahoo, data: intradayData[TICKER_META[t]?.yahoo] }))
    .filter(e => e.data?.points?.length > 0);

  if (entries.length === 0) {
    if (statusEl) statusEl.textContent = intradayLoaded ? "geen data" : "laden…";
    if (!intradayLoaded) { gridEl.innerHTML = ""; return; }
    gridEl.innerHTML = `<div style="color:#334155;font-size:11px">Markt gesloten of geen intradaydata beschikbaar.</div>`;
    return;
  }

  const lastTs   = Math.max(...entries.map(e => e.data.points[e.data.points.length - 1].ts));
  const lastTime = new Date(lastTs * 1000).toLocaleTimeString("nl-BE", { hour: "2-digit", minute: "2-digit" });
  if (statusEl) {
    statusEl.textContent = `bijgewerkt ${lastTime}`;
    statusEl.style.color = "";
  }
  gridEl.style.opacity = "";

  const todayStr = new Date().toISOString().slice(0, 10);

  gridEl.innerHTML = entries.map(({ ticker, yahoo, data }) => {
    const prev    = data.previousClose;
    const last    = data.points[data.points.length - 1];
    const pct     = prev ? ((last.close - prev) / prev * 100) : 0;
    const cls     = pct >= 0 ? "c-pos" : "c-neg";
    const isStale = data.date !== todayStr;
    return `<div class="intraday-card" style="${isStale ? "opacity:0.5" : ""}">
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:0.04em;color:#94a3b8;margin-bottom:2px">
        <span class="pos-dot" style="background:${getColor(ticker)}"></span>${ticker}

      </div>
      <div class="metric-value ${cls}" style="font-size:16px;margin-top:5px">${pct >= 0 ? "+" : ""}${pct.toFixed(2)}%</div>
      ${sparklineSVG(data.points, prev, getTradingMins(yahoo))}
      <div class="metric-sub">${data.currency || ""} ${last.close.toFixed(2)}</div>
    </div>`;
  }).join("");

  renderTodayMetric();
}

async function loadIntradayData(force = false) {
  const yahooSymbols = [...new Set(CURRENT_TICKERS.map(t => TICKER_META[t]?.yahoo).filter(Boolean))];
  if (yahooSymbols.length === 0) return;
  const statusEl = document.getElementById("intradayStatus");
  if (statusEl) statusEl.textContent = "laden…";
  try {
    const url  = `${SERVER_BASE}/api/intraday?symbols=${yahooSymbols.join(",")}${force ? "&force=1" : ""}`;
    const res  = await fetch(url);
    const json = await res.json();
    if (json.status !== "ok") throw new Error(json.message);
    intradayData = json.data;
  } catch (e) {
    if (statusEl) statusEl.textContent = "laden mislukt";
    console.warn("Intraday load failed:", e.message);
  }
  intradayLoaded = true;
  renderIntradaySection();
}

function refreshIntraday() { loadIntradayData(true); }

        <td>${fmt(totalCost)}</td><td>${fmt(totalVal)}</td>
        <td class="${tc}">${totalPl >= 0 ? "+" : ""}${fmt(totalPl)}</td>
        <td class="${tc}">${fmtPct(totalPct)}</td>
      </tr></tfoot>
    </table>`;
}

// ============================================================
// IMPORT TAB
// ============================================================
function renderImport() {
  destroyAllCharts();
  currentTab = "import";
  const txCount   = RAW_TRANSACTIONS.length;
  const dateRange = txCount > 0
    ? `${RAW_TRANSACTIONS[0].date} → ${RAW_TRANSACTIONS[RAW_TRANSACTIONS.length-1].date}`
    : "—";

  document.getElementById("root").innerHTML = `
    ${renderAppHeader()}
    <div class="import-wrap">
      <div class="import-info">
        <strong>${txCount} transacties opgeslagen</strong>${txCount > 0 ? ` · ${dateRange}` : ""}<br>
        Upload een DeGiro <em>Transacties.csv</em>. Bestaande data kun je behouden of vervangen.
      </div>
      <div class="drop-zone" id="dropZone"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="event.preventDefault();this.classList.remove('drag-over');handleCSVFile(event.dataTransfer.files[0])">
        <strong>Sleep CSV-bestand hierheen</strong>
        <p>of <label for="csvInput">klik om te bladeren</label></p>
        <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="handleCSVFile(this.files[0])">
      </div>
      <div id="mappingSection" style="display:none"></div>
    </div>`;
}

function handleCSVFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const rawRows = parseDeGiroCSV(e.target.result);
      if (rawRows.length === 0) { alert("Geen geldige transacties gevonden."); return; }
      parsedCSVRows = aggregateOrders(rawRows);

      const isinLookup = buildIsinLookup();
      const isinMeta = {};
      parsedCSVRows.forEach(r => { if (!isinMeta[r.isin]) isinMeta[r.isin] = { beurs: r.beurs }; });
      const unknowns = Object.entries(isinMeta).filter(([isin]) => !isinLookup[isin]);

      const sec = document.getElementById("mappingSection");
      sec.style.display = "block";
      if (unknowns.length > 0) {
        sec.innerHTML = `<div style="color:#94a3b8;font-size:13px;margin-top:16px">Symbolen opzoeken (${unknowns.length})…</div>`;
      }

      const resolved = {};
      await Promise.all(unknowns.map(async ([isin, meta]) => {
        try {
          const r = await fetch(`${SERVER_BASE}/api/lookup?isin=${encodeURIComponent(isin)}&exchange=${encodeURIComponent(meta.beurs)}`);
          const j = await r.json();
          if (j.status === "ok" && j.symbol) {
            const sfx = guessYahooSuffix(meta.beurs);
            const ticker = sfx ? j.symbol.slice(0, j.symbol.length - sfx.length) : j.symbol;
            resolved[isin] = { ticker, yahoo: j.symbol };
          }
        } catch {}
      }));

      renderMappingTable(parsedCSVRows, resolved);
    } catch (err) { alert("CSV-fout: " + err.message); }
  };
  reader.readAsText(file, "utf-8");
}

function renderMappingTable(rows, resolved = {}) {
  const isinMap = {};
  rows.forEach(r => {
    if (!isinMap[r.isin]) isinMap[r.isin] = { product: r.product, beurs: r.beurs, count: 0, currency: r.currency };
    isinMap[r.isin].count++;
  });
  const isinLookup = buildIsinLookup();

  const tableRows = Object.entries(isinMap).map(([isin, info]) => {
    const known  = isinLookup[isin] || resolved[isin] || {};
    const sfx    = guessYahooSuffix(info.beurs);
    const ticker = known.ticker || "";
    const yahoo  = known.yahoo  || (ticker ? ticker + sfx : "");
    const missing = !ticker;
    return `<tr data-isin="${isin}" ${missing ? 'style="outline:1px solid #f59e0b;outline-offset:-1px"' : ""}>
      <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#475569">${isin}</td>
      <td style="color:#94a3b8;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${info.product}</td>
      <td><input id="ticker_${isin}" value="${ticker}" placeholder="bv. ASTS" style="width:76px" oninput="updateYahooGuess('${isin}','${sfx}')"></td>
      <td><input id="yahoo_${isin}"  value="${yahoo}"  placeholder="bv. ASTS of VWCE.DE"></td>
      <td><select id="ccy_${isin}" style="width:58px">
        <option value="EUR" ${info.currency!=="USD"?"selected":""}>EUR</option>
        <option value="USD" ${info.currency==="USD"?"selected":""}>USD</option>
      </select></td>
      <td style="color:#475569;font-size:11px;text-align:right">${info.count}</td>
    </tr>`;
  }).join("");

  document.getElementById("mappingSection").style.display = "block";
  document.getElementById("mappingSection").innerHTML = `
    <h3 style="font-size:13px;color:#e2e8f0;margin:20px 0 6px;font-weight:600">ISIN → Ticker mapping</h3>
    <p style="font-size:12px;color:#64748b;margin-bottom:4px;line-height:1.5">
      Vul per ISIN de korte naam en Yahoo Finance symbool in.<br>
      US-aandelen: ticker alleen (bv. <span style="font-family:'JetBrains Mono',monospace">ASTS</span>) ·
      Europese ETFs: voeg suffix toe (bv. <span style="font-family:'JetBrains Mono',monospace">VWCE.DE</span>)
    </p>
    <table class="map-table">
      <thead><tr><th>ISIN</th><th>Product</th><th>Ticker</th><th>Yahoo symbool</th><th>Munt</th><th>#</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="import-actions">
      <button class="btn" onclick="setTab('portefeuille')" style="margin-right:auto">← Annuleren</button>
      <button class="btn" onclick="saveImport('merge')">Samenvoegen</button>
      <button class="btn success" onclick="saveImport('replace')">Vervang alles</button>
    </div>`;
}

function updateYahooGuess(isin, suffix) {
  const ticker  = (document.getElementById(`ticker_${isin}`)?.value || "").trim().toUpperCase();
  const yahooEl = document.getElementById(`yahoo_${isin}`);
  if (yahooEl && !yahooEl.dataset.edited) yahooEl.value = ticker + suffix;
}

async function saveImport(mode) {
  const isinEls = document.querySelectorAll("[data-isin]");
  let valid = true;
  const mapping = {};
  isinEls.forEach(row => {
    const isin   = row.dataset.isin;
    const ticker = (document.getElementById(`ticker_${isin}`)?.value || "").trim().toUpperCase();
    const yahoo  = (document.getElementById(`yahoo_${isin}`)?.value  || "").trim();
    const ccy    = document.getElementById(`ccy_${isin}`)?.value || "EUR";
    document.getElementById(`ticker_${isin}`).classList.toggle("invalid", !ticker);
    document.getElementById(`yahoo_${isin}`).classList.toggle("invalid",  !yahoo);
    if (!ticker || !yahoo) valid = false;
    mapping[isin] = { ticker, yahoo, currency: ccy };
  });
  if (!valid) { alert("Vul alle ticker- en Yahoo-velden in."); return; }

  const transactions = parsedCSVRows.map(row => {
    const m = mapping[row.isin];
    if (!m) return null;
    return { date: row.date, ticker: m.ticker, yahoo: m.yahoo, isin: row.isin,
             shares: row.shares, costEur: Math.abs(row.totaalEur || 0),
             currency: m.currency, label: row.product };
  }).filter(Boolean);

  try {
    const res  = await fetch(`${SERVER_BASE}/api/transactions`, {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ mode, transactions }),
    });
    const json = await res.json();
    if (json.status !== "ok") throw new Error(json.message);
    alert(`${json.count} transacties opgeslagen.`);
    await init();
  } catch (e) { alert("Opslaan mislukt: " + e.message); }
}

// ============================================================
// CONTROLS
// ============================================================
function setTab(t) {
  currentTab = t;
  if (t === "portefeuille") renderApp();
  else if (t === "analyse") renderAnalyse();
  else if (t === "import")  renderImport();
}

function setView(v)          { currentView = v; renderApp(); }
function setPeriod(p)        { currentPeriod = p; renderApp(); }
function setPeriodAnalyse(p) { currentPeriod = p; renderAnalyse(); }
function toggleClosed()      { showClosed = !showClosed; renderApp(); }

function toggleTheme() {
  currentTheme = currentTheme === "dark" ? "default" : "dark";
  localStorage.setItem("theme", currentTheme);
  applyTheme();
  if      (currentTab === "portefeuille") renderApp();
  else if (currentTab === "analyse")      renderAnalyse();
  else if (currentTab === "import")       renderImport();
}

async function clearCache() {
  try { await fetch(`${SERVER_BASE}/api/cache/clear`, { method:"POST" }); await init(); }
  catch (e) { alert("Cache clear mislukt: " + e.message); }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  document.getElementById("root").innerHTML = `
    ${renderAppHeader()}
    <div class="loading">
      <div style="color:#94a3b8;font-size:13px;margin-bottom:12px">Laden…</div>
      <div class="progress-bar"><div class="progress-fill" style="width:5%"></div></div>
    </div>`;

  try {
    const res  = await fetch(`${SERVER_BASE}/api/transactions`);
    const json = await res.json();
    if (json.status !== "ok") throw new Error(json.message);

    if (!json.data || json.data.length === 0) {
      RAW_TRANSACTIONS = []; TICKER_META = {}; CURRENT_TICKERS = [];
      renderImport();
      return;
    }

    RAW_TRANSACTIONS = json.data;
    buildTickerMeta();
    CURRENT_TICKERS = computeCurrentTickers();
    Object.keys(TICKER_META).forEach(t => getColor(t));

    await loadData();
  } catch (e) {
    document.getElementById("root").innerHTML = `
      ${renderAppHeader()}
      <div class="error-box">
        <div style="font-size:14px;color:#f87171;margin-bottom:8px;font-weight:600">Laden mislukt</div>
        <div style="font-size:12px;color:#94a3b8">${e.message}</div>
        <button class="btn" onclick="init()" style="margin-top:16px">Opnieuw</button>
      </div>`;
  }
}

document.body.classList.toggle("privacy", privacyMode);
applyTheme();
init();
  </script>
</body>
