<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portefeuille Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="top-bar">
    <div class="top-bar-inner">
      <div class="summary-with-controls">
        <div id="summary-bar"></div>
        <div class="display-controls">
          <button class="privacy-btn theme-btn" onclick="globalThis._toggleTheme()" title="Thema wisselen">◑</button>
          <button class="privacy-btn" onclick="globalThis._togglePrivacy()" title="Privacy mode">👁</button>
        </div>
      </div>
      <div id="app-header"></div>
    </div>
  </div>
  <div id="root"></div>
  <!-- Position detail modal (static overlay, filled by showPosModal) -->
  <div id="posModal" onclick="if(event.target===this)window._closePosModal()" onkeydown="if(event.key==='Escape')window._closePosModal()"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
